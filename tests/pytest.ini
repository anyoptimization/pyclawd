[pytest]
# Isolated config for pyclawd's own generic-core unit tests.
# Run from the repo root:
#   pyclawd python -m pytest tests -c tests/pytest.ini
#   (or, before install:  python -m pytest tests -c tests/pytest.ini)
# python_classes is emptied so the `TestConfig` dataclass isn't collected as a test class.
python_classes =
python_files = test_*.py

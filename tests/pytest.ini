[pytest]
# Isolated config for pyclawd's own generic-core unit tests.
# Run from the repo root:
#   pyclawd python -m pytest tests -c tests/pytest.ini
#   (or, before install:  python -m pytest tests -c tests/pytest.ini)
# python_classes is emptied so the `TestConfig` dataclass isn't collected as a test class.
# --strict-markers/--strict-config are on here to match the doctrine pyclawd preaches
# (an unregistered marker or unknown config key errors immediately, not silently).
addopts = -ra --strict-markers --strict-config --import-mode=importlib
xfail_strict = true
python_classes =
python_files = test_*.py
markers =
    slow: tests taking >1s — excluded from the fast & default tiers.
    integration: tests needing external services/network/filesystem — excluded from the fast tier.
    golden: behavior-regression snapshot test (the golden oracle; see `pyclawd golden`).
    benchmark: performance-regression timing test (the benchmark oracle; see `pyclawd benchmark`).
